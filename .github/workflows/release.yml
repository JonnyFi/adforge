name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  motion-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install ffmpeg + chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install motion deps
        working-directory: templates/engines/motion
        run: npm ci || npm install

      - name: render ci-smoke walkthrough
        working-directory: templates
        run: |
          mkdir -p .ci-outputs
          ./engines/motion/render.sh \
            variants/walkthrough-ci-smoke.json \
            walkthrough \
            .ci-outputs/walkthrough-ci-smoke.mp4

      - name: assert output size
        run: |
          OUT="templates/.ci-outputs/walkthrough-ci-smoke.mp4"
          if [ ! -f "$OUT" ]; then echo "no output mp4 at $OUT"; exit 1; fi
          SIZE=$(stat -c%s "$OUT")
          echo "rendered $OUT — $SIZE bytes"
          if [ "$SIZE" -lt 102400 ]; then
            echo "output mp4 suspiciously small ($SIZE bytes, want >100KB)"
            exit 1
          fi

  publish:
    runs-on: ubuntu-latest
    needs: motion-smoke
    permissions:
      id-token: write      # still needed for --provenance (sigstore signing)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: run test harness (skip motion render)
        run: ./test/run-tests.sh --skip-motion

      - name: publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
